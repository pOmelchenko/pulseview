[workspace]
name = "pulseview"
version = "0.1.0"
description = "pixi instructions for PulseView"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]
requires-pixi = ">=0.48"

[dependencies]
autoconf = "*"
autoconf-archive = "*"
automake = "*"
cmake = "*"
compilers = "*"
curl = "*"
doxygen = "*"
gettext = "*"
git = "*"
glib = "*"
"glibmm-2.4" = "*"
libboost-devel = "*"
libftdi = "*"
libtool = "*"
libusb = "*"
libzip = "*"
make = "*"
nettle = "*"
ninja = "*"
numpy = "*"
pkg-config = "*"
pygobject = "*"
python = ">=3.11,<3.13"
qt-main = ">=5.15,<5.16"
setuptools = "*"
"sigcpp-2.0" = "*"
swig = "4.1.*"

[feature.docs.dependencies]
asciidoctor = "*"

[environments]
default = { solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }

[target.linux-64.tasks]
configure-debug = { cmd = ["bash", "scripts/pixi/configure.sh"], depends-on = ["bootstrap-sigrok"], env = { PULSEVIEW_BUILD_TYPE = "Debug", PULSEVIEW_BUILD_DIR = "build/debug" } }
configure-release = { cmd = ["bash", "scripts/pixi/configure.sh"], depends-on = ["bootstrap-sigrok"], env = { PULSEVIEW_BUILD_TYPE = "RelWithDebInfo", PULSEVIEW_BUILD_DIR = "build/release" } }

[target.osx-64.tasks]
configure-debug = { cmd = ["bash", "scripts/pixi/configure.sh"], depends-on = ["bootstrap-sigrok"], env = { PULSEVIEW_BUILD_TYPE = "Debug", PULSEVIEW_BUILD_DIR = "build/debug" } }
configure-release = { cmd = ["bash", "scripts/pixi/configure.sh"], depends-on = ["bootstrap-sigrok"], env = { PULSEVIEW_BUILD_TYPE = "RelWithDebInfo", PULSEVIEW_BUILD_DIR = "build/release" } }

[target.osx-arm64.tasks]
configure-debug = { cmd = ["bash", "scripts/pixi/configure.sh"], depends-on = ["bootstrap-sigrok"], env = { PULSEVIEW_BUILD_TYPE = "Debug", PULSEVIEW_BUILD_DIR = "build/debug" } }
configure-release = { cmd = ["bash", "scripts/pixi/configure.sh"], depends-on = ["bootstrap-sigrok"], env = { PULSEVIEW_BUILD_TYPE = "RelWithDebInfo", PULSEVIEW_BUILD_DIR = "build/release" } }

[tasks]
bootstrap-sigrok = { cmd = ["bash", "scripts/pixi/bootstrap-sigrok.sh"] }
configure = [{ task = "configure-debug" }]
build = [{ task = "build-debug" }]
test = [{ task = "test-debug" }]
pulseview = [{ task = "pulseview-debug" }]

build-debug = { cmd = ["cmake", "--build", "build/debug"], depends-on = ["configure-debug"] }
build-release = { cmd = ["cmake", "--build", "build/release"], depends-on = ["configure-release"] }
test-debug = { cmd = ["ctest", "--test-dir", "build/debug", "--output-on-failure"], depends-on = ["build-debug"] }
test-release = { cmd = ["ctest", "--test-dir", "build/release", "--output-on-failure"], depends-on = ["build-release"] }
pulseview-debug = { cmd = ["./build/debug/pulseview"], env = { SIGROK_FIRMWARE_DIR = ".pixi/external/default/share/sigrok-firmware" } }
pulseview-release = { cmd = ["./build/release/pulseview"], env = { SIGROK_FIRMWARE_DIR = ".pixi/external/default/share/sigrok-firmware" } }

[feature.docs.tasks]
manual = { cmd = ["cmake", "--build", "build/debug", "--target", "manual"], depends-on = ["configure"] }
